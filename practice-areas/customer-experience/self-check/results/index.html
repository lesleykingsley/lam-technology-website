<script>
"use strict";
var STORAGE_KEY = "cx_sc_answers_v1";
var SEV_LABELS = { critical: "Critical", material: "Material", note: "Note", clear: "Clear" };

function loadAnswers(){ try { var s = sessionStorage.getItem(STORAGE_KEY); if (s) return JSON.parse(s) || {}; } catch(e){} return {}; }

/* POLARITY (matches the Pass 1 questionnaire map):
   PROBLEM-FRAMED (yes = problem): sprawl, platform_age, migration, agent_tools, silos, overlap
   INVERTED (no = problem):        self_service, data_ownership, cost_visibility, stack_readiness
   SEGMENT (not scored):           ai_trigger ("yes" | "coming" | "no") */
function buildFindings(a){
  var out = [];
  var seg = a.ai_trigger || null;

  // PROBLEM-FRAMED — yes = problem, partially = lesser, no = healthy
  if (a.sprawl === "yes" && a.silos === "yes") {
    out.push(F_SPRAWL("critical"));
  } else {
    if (a.sprawl === "yes") out.push(F_SPRAWL("material"));
    else if (a.sprawl === "partially") out.push(F_SPRAWL("note"));
    if (a.silos === "yes") out.push(F_SILOS("material"));
    else if (a.silos === "partially") out.push(F_SILOS("note"));
  }
  if (a.migration === "yes") out.push(F_MIGRATION("critical"));
  else if (a.migration === "partially") out.push(F_MIGRATION("material"));
  if (a.platform_age === "yes") out.push(F_PLATFORM("material"));
  else if (a.platform_age === "partially") out.push(F_PLATFORM("note"));
  if (a.overlap === "yes") out.push(F_OVERLAP("material"));
  else if (a.overlap === "partially") out.push(F_OVERLAP("note"));
  if (a.agent_tools === "yes") out.push(F_AGENT("material"));
  else if (a.agent_tools === "partially") out.push(F_AGENT("note"));

  // INVERTED — no = problem, partially = lesser, yes = healthy
  if (a.self_service === "no") out.push(F_SELFSERVE("material"));
  else if (a.self_service === "partially") out.push(F_SELFSERVE("note"));
  if (a.data_ownership === "no") out.push(F_DATA("material"));
  else if (a.data_ownership === "partially") out.push(F_DATA("note"));
  if (a.cost_visibility === "no") out.push(F_COST("material"));
  else if (a.cost_visibility === "partially") out.push(F_COST("note"));
  if (a.stack_readiness === "no") out.push(F_STACK(seg === "yes" ? "critical" : "material"));
  else if (a.stack_readiness === "partially") out.push(F_STACK(seg === "yes" ? "material" : "note"));

  if (out.length === 0) out.push(F_CLEAN());
  return { findings: out, segment: seg };
}

function F_SPRAWL(sev){
  if (sev === "critical") return {
    severity: "critical", headline: "Your agents are working across a stack of stacks.",
    paragraphs: [
      { label: "What we saw:", text: "Your agents log into more than three separate systems to do their job, and your channels — voice, chat, email, social — run in systems that don’t share customer context." },
      { label: "What it usually means:", text: "This is the most common pattern we see in mid-market CX: a stack of stacks, assembled one tool at a time, none of them fully integrated. Every login is context lost and time added; every siloed channel is a customer repeating themselves. The cost shows up as handle time, agent friction, and an experience that fragments the moment someone switches channels." },
      { label: "What Experience Examination™ does:", text: "Maps the full tool and channel footprint, identifies what consolidates onto a single platform, and sequences the move so you stop paying the integration tax." }
    ]
  };
  if (sev === "note") return {
    severity: "note", headline: "Tool sprawl is starting to show.",
    paragraphs: [
      { label: "What we saw:", text: "Your agents partly rely on several separate systems to do their job." },
      { label: "What it usually means:", text: "Sprawl accumulates quietly. Caught early, it’s a consolidation opportunity rather than a rebuild." },
      { label: "What Experience Examination™ does:", text: "Maps the tool footprint and flags what can collapse together before it hardens." }
    ]
  };
  return {
    severity: "material", headline: "Your agents are stitching the experience together by hand.",
    paragraphs: [
      { label: "What we saw:", text: "Your agents log into more than three separate systems to do their job." },
      { label: "What it usually means:", text: "Tool sprawl is rarely a decision; it accumulates. Each system was justified on its own, but together they mean swivel-chair work, context lost between logins, and onboarding that takes longer every time you add a tool." },
      { label: "What Experience Examination™ does:", text: "Maps the tool footprint and identifies what can consolidate, so agents work in fewer places and the customer’s history follows them." }
    ]
  };
}
function F_SILOS(sev){
  return {
    severity: sev, headline: "Your channels don’t share what the customer already told you.",
    paragraphs: [
      { label: "What we saw:", text: "Your channels — voice, chat, email, social — run in separate systems that don’t share customer context." },
      { label: "What it usually means:", text: "Siloed channels force customers to repeat themselves and leave agents working blind to what happened an hour ago on a different channel. The experience fragments exactly where customers expect it to be seamless." },
      { label: "What Experience Examination™ does:", text: "Maps where context breaks between channels and identifies the path to a single customer view across all of them." }
    ]
  };
}
function F_MIGRATION(sev){
  return {
    severity: sev, headline: "You’re paying for two platforms at once.",
    paragraphs: [
      { label: "What we saw:", text: "You’ve been mid-migration to a new platform for more than twelve months." },
      { label: "What it usually means:", text: "A migration that runs this long means parallel-running — paying for the old platform and the new one simultaneously, often with the team split across both. The longer it runs, the more the savings that justified the move evaporate into double licensing, double maintenance, and stalled adoption." },
      { label: "What Experience Examination™ does:", text: "Finds why the migration stalled, scopes the path to cut over cleanly, and stops the double-paying." }
    ]
  };
}
function F_PLATFORM(sev){
  return {
    severity: sev, headline: "Your platform is a generation behind.",
    paragraphs: [
      { label: "What we saw:", text: "Your contact center platform is on-premises, or more than five years old." },
      { label: "What it usually means:", text: "Platforms this age are usually carrying per-seat pricing negotiated for a different era — typically above current market — while missing the modern capabilities (intelligent routing, real-time analytics, AI assist) that newer platforms include by default. The cost is both what you overpay and what you can’t do." },
      { label: "What Experience Examination™ does:", text: "Benchmarks your per-seat cost against current market and maps the path to a modern platform without a rip-and-replace shock." }
    ]
  };
}
function F_OVERLAP(sev){
  return {
    severity: sev, headline: "You’re paying twice for the same capability.",
    paragraphs: [
      { label: "What we saw:", text: "You’re paying for both a UCaaS platform and a CCaaS platform with overlapping features — call recording, for example, licensed in both." },
      { label: "What it usually means:", text: "Overlapping platforms are one of the clearest waste lines in a CX stack. Capabilities like recording and analytics often live in two places, each billed separately, when one platform could carry both. Nobody decided to pay twice; the contracts just grew up alongside each other." },
      { label: "What Experience Examination™ does:", text: "Maps the feature overlap across your platforms and prices the consolidation onto the one that serves you best." }
    ]
  };
}
function F_AGENT(sev){
  return {
    severity: sev, headline: "Your tools are driving agents out the door.",
    paragraphs: [
      { label: "What we saw:", text: "Your agents complain about their tools more than your customers complain about service." },
      { label: "What it usually means:", text: "When the people closest to the customer are fighting the stack, the cost lands as attrition — and attrition in a contact center is expensive, because every departure is a recruiting, onboarding, and ramp cost before the new agent is productive. Tool friction is a retention problem wearing a technology mask." },
      { label: "What Experience Examination™ does:", text: "Identifies the tool friction agents actually feel and ties it to the consolidation and workflow fixes that reduce it." }
    ]
  };
}
function F_SELFSERVE(sev){
  return {
    severity: sev, headline: "Customers want to help themselves — and can’t.",
    paragraphs: [
      { label: "What we saw:", text: "Customers can’t reliably resolve common issues without reaching a live agent." },
      { label: "What it usually means:", text: "Self-service is now an expectation, not a perk. Every common issue that forces a live contact is both a cost you didn’t need to incur and a friction point for a customer who would rather have solved it themselves. The gap compounds as volume grows." },
      { label: "What Experience Examination™ does:", text: "Identifies which contact types are self-service candidates and what the stack needs to deflect them well — without pushing customers into a dead end." }
    ]
  };
}
function F_DATA(sev){
  return {
    severity: sev, headline: "You may not own your own customer data.",
    paragraphs: [
      { label: "What we saw:", text: "You’re not sure whether you’d keep your recordings, transcripts, and interaction data if you left your current CX vendor tomorrow." },
      { label: "What it usually means:", text: "Data portability is the quiet contract red flag in CX. If your interaction history, recordings, and transcripts aren’t cleanly portable, leaving is expensive by design — and that lock-in shapes every renewal conversation whether or not it’s ever named. The “what happens if you leave” answer is leverage you may not currently hold." },
      { label: "What Experience Examination™ does:", text: "Reads the contract for data-ownership and portability terms and tells you exactly what you’d keep, what you’d lose, and what to renegotiate." }
    ]
  };
}
function F_COST(sev){
  return {
    severity: sev, headline: "You can’t see your true cost per interaction.",
    paragraphs: [
      { label: "What we saw:", text: "You don’t know your true cost per interaction — including telephony, licensing, and integration." },
      { label: "What it usually means:", text: "This is the CFO finding. You can’t manage, benchmark, or negotiate what you can’t measure, and in CX the real cost hides in the gaps between line items — the telephony under one vendor, licensing under another, and integration billed as projects. The number is almost always higher than the one people quote." },
      { label: "What Experience Examination™ does:", text: "Builds the fully-loaded cost-per-interaction picture across every line, so you can see what you actually spend before you decide what to change." }
    ]
  };
}
function F_STACK(sev){
  if (sev === "critical") return {
    severity: "critical", headline: "The foundation can’t carry what leadership wants to add.",
    paragraphs: [
      { label: "What we saw:", text: "Leadership is already asking for AI, but your stack isn’t consolidated enough to add new capabilities without a major untangling first." },
      { label: "What it usually means:", text: "AI doesn’t fix a fragmented stack — it inherits it. Bolting new capability onto siloed channels and disconnected tools multiplies the fragmentation and the cost, and the pilot that was supposed to prove value stalls on data nobody can reach. The order matters: consolidate the foundation, then add the capability." },
      { label: "What Experience Examination™ does:", text: "Maps what has to consolidate before AI can deliver, and sequences the foundation work so the capability leadership wants actually lands." }
    ]
  };
  return {
    severity: sev, headline: "The foundation isn’t ready for what’s coming.",
    paragraphs: [
      { label: "What we saw:", text: "Your stack isn’t consolidated enough to add new capabilities without a major untangling first." },
      { label: "What it usually means:", text: "New capability — AI or otherwise — needs a consolidated foundation to build on. When the stack is fragmented, every addition has to be wired into multiple systems, and the integration cost quietly exceeds the cost of the capability itself." },
      { label: "What Experience Examination™ does:", text: "Identifies what has to consolidate first and sequences the foundation work so future additions are cheap, not painful." }
    ]
  };
}
function F_CLEAN(){
  return {
    severity: "clear", headline: "Your CX stack looks healthier than most we see.",
    paragraphs: [
      { label: "What we saw:", text: "Across tool sprawl, platform age, channel integration, agent experience, self-service, data ownership, cost visibility, and stack readiness, none of your answers tripped a flag." },
      { label: "What it usually means:", text: "That’s rarer than you’d think. Most mid-market CX stacks drift as tools and contracts accumulate; the ones that don’t are the ones being actively managed, not just operated." },
      { label: "What Experience Examination™ does:", text: "If you want a second set of eyes before your next platform decision or renewal — or before leadership’s AI ask lands — the engagement is built to confirm the stack is as ready as it feels." }
    ]
  };
}

function escapeHtml(s){ return String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;").replace(/'/g,"&#39;"); }

function segmentLine(seg){
  if (seg === "yes") return "Leadership is already asking for AI. That makes the gaps below more urgent — you’re being asked to build on this foundation now.";
  if (seg === "coming") return "AI is on the horizon for you. The gaps below are what to fix before it arrives.";
  return null;
}

function renderFindings(root, findings, seg){
  var isClean = findings.length === 1 && findings[0].severity === "clear";
  var subhead = isClean
    ? "Across the nine things we test for, <em>nothing tripped a flag.</em>"
    : "Plain-language read on where the friction, leakage, or contract risk in your CX stack <em>likely sits.</em>";

  var html = '';
  html += '<header class="sc-hero">';
  html += '<div class="sc-eyebrow"><span class="accent">[EXPERIENCE EXAMINATION™]</span> <span class="sep">·</span> SELF-CHECK <span class="sep">·</span> FINDINGS</div>';
  html += '<h1 class="sc-title">' + subhead + '</h1>';
  var sl = segmentLine(seg);
  if (sl) html += '<p class="sc-lede">' + escapeHtml(sl) + '</p>';
  html += '</header>';

  if (!isClean) {
    html += '<aside class="sc-band">';
    html += '<div class="sc-band-eyebrow">THE MAGNITUDE</div>';
    html += '<p class="sc-band-text">On a typical CX stack rationalization, LAM finds 20–25% of contact-center spend recoverable. The waste clusters at 250+ seats; below 100 seats it’s usually smaller. Savings are largest when consolidation and the platform decision happen together.</p>';
    html += '</aside>';
  }

  html += '<div class="sc-findings-eyebrow">FINDINGS &middot; ' + findings.length + (findings.length === 1 ? ' SIGNAL' : ' SIGNALS') + '</div>';
  html += '<div class="sc-findings">';
  findings.forEach(function(f){
    html += '<article class="sc-finding sc-finding-' + f.severity + '">';
    html += '<span class="sc-finding-sev">' + escapeHtml(SEV_LABELS[f.severity] || f.severity) + '</span>';
    html += '<h2 class="sc-finding-title">' + escapeHtml(f.headline) + '</h2>';
    f.paragraphs.forEach(function(p){
      html += '<p class="sc-finding-para"><strong>' + escapeHtml(p.label) + '</strong> ' + escapeHtml(p.text) + '</p>';
    });
    html += '</article>';
  });
  html += '</div>';

  html += '<aside class="sc-cross">Customer-experience problems rarely sit still — they travel with the infrastructure underneath them. See the full <a href="/practice-areas/customer-experience/">Experience Examination™</a> lens.</aside>';

  html += '<section class="sc-cta-section">';
  html += '<div class="sc-cta-eyebrow">WHAT HAPPENS NEXT</div>';
  html += '<h2 class="sc-cta-headline"><em>Validate the signals. Fix the foundation, not just the symptoms.</em></h2>';
  html += '<p class="sc-cta-body">The Self-Check surfaces signals. The Experience Examination™ engagement validates them, prices the consolidation, and builds the plan — so when leadership asks for AI, the stack is ready for it.</p>';
  html += '<div class="sc-cta-row">';
  html += '<a class="btn btn-primary" href="/contact/?topic=experience-examination">BOOK AN EXPERIENCE EXAMINATION CONVERSATION <span class="btn-arrow">&rarr;</span></a>';
  html += '<a class="btn btn-ghost" href="/practice-areas/customer-experience/self-check/">RETAKE THE SELF-CHECK</a>';
  html += '</div>';
  html += '</section>';

  root.innerHTML = html;
}

function renderEmpty(root){
  var html = '';
  html += '<div class="sc-empty">';
  html += '<header class="sc-hero">';
  html += '<div class="sc-eyebrow"><span class="accent">[EXPERIENCE EXAMINATION™]</span> <span class="sep">·</span> SELF-CHECK <span class="sep">·</span> RESULTS</div>';
  html += '<h1 class="sc-title">It looks like you haven’t taken the Self-Check yet.</h1>';
  html += '<p class="sc-lede">Findings appear here after you complete the 11-question Self-Check.</p>';
  html += '</header>';
  html += '<div class="sc-cta-row"><a class="btn btn-primary" href="/practice-areas/customer-experience/self-check/">TAKE THE SELF-CHECK <span class="btn-arrow">&rarr;</span></a></div>';
  html += '</div>';
  root.innerHTML = html;
}

function fireGAComplete(findings, seg){
  if (typeof gtag !== "function") return;
  function countSev(s){ return findings.filter(function(x){ return x.severity === s; }).length; }
  gtag("event", "self_check_complete", {
    tool: "cx_experience_examination",
    finding_count: findings.length,
    critical_count: countSev("critical"),
    material_count: countSev("material"),
    note_count: countSev("note"),
    clear_count: countSev("clear"),
    ai_trigger: seg || "none"
  });
}

function attachOutboundTracking(root, findingCount){
  if (typeof gtag !== "function") return;
  root.addEventListener("click", function(e) {
    var t = e.target.closest && e.target.closest("a");
    if (!t) return;
    var href = t.getAttribute("href") || "";
    if (href.indexOf("/contact/") !== -1 || href.indexOf("mailto:") !== -1) {
      gtag("event", "self_check_to_snapshot", {
        tool: "cx_experience_examination",
        target_href: href,
        finding_count: findingCount
      });
    }
  });
}

function init(){
  var a = loadAnswers();
  var root = document.getElementById("cx-sc-results-root");
  if (!a || Object.keys(a).length === 0) { renderEmpty(root); return; }
  var result = buildFindings(a);
  renderFindings(root, result.findings, result.segment);
  fireGAComplete(result.findings, result.segment);
  attachOutboundTracking(root, result.findings.length);
}
document.addEventListener("DOMContentLoaded", init);
</script>

</body>
