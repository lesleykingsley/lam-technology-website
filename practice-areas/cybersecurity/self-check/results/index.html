<script>
/* Vigilance Verification — Self-Check Results Engine (Pass 2)
   DRAFT — findings copy flagged for Raj's review before linking.
   Reads sessionStorage 'cyber_sc_answers_v1' (yes/partially/no).
   Scoring: yes=10, partially=5, no=0. 6 domains x 2 questions = 120 max.
   RAG: Green >=75, Amber 40-74, Red <40. */

const STORAGE_KEY = 'cyber_sc_answers_v1';

const DOMAINS = [
  { id: 'mfa',      name: 'Multi-Factor Authentication',          questions: ['mfa_remote', 'mfa_privileged'] },
  { id: 'edr',      name: 'Endpoint Detection & Response',        questions: ['edr_deployed', 'edr_monitored'] },
  { id: 'backups',  name: 'Secured, Encrypted & Tested Backups',  questions: ['backup_immutable', 'backup_tested'] },
  { id: 'pam',      name: 'Privileged Access Management',         questions: ['pam_vault', 'pam_jit'] },
  { id: 'email',    name: 'Email Filtering & Web Security',       questions: ['email_filtering', 'email_dmarc'] },
  { id: 'training', name: 'Cybersecurity Awareness Training',     questions: ['training_annual', 'phishing_sim'] }
];

const FINDINGS = {
  mfa: {
    green: 'MFA is enforced across remote access, cloud logins, and privileged accounts. This is the single highest-impact control insurers look for and you have it covered.',
    amber: 'MFA exists but coverage has gaps. Either some remote access vectors are still password-only, or privileged accounts have not yet been brought under MFA. The gap is the thing attackers target, and closing the remaining vectors is usually inexpensive and fast.',
    red:   'MFA is not consistently enforced. This is the control insurers price most heavily and the one attackers exploit first. Closing this gap is the single highest-leverage action on this list.'
  },
  edr: {
    green: 'EDR is deployed across endpoints and alerts are actively monitored. The capability exists and someone is watching it.',
    amber: 'EDR is deployed but monitoring is incomplete. Either coverage is partial or alerts are only watched in business hours. Tools without watchers produce log files, not defense.',
    red:   'EDR is either not deployed at scale or not actively monitored. Endpoints are where most breaches begin; visibility here is foundational. This is one to address near-term.'
  },
  backups: {
    green: 'Backups are immutable or air-gapped, and restoration is tested at least quarterly. You are positioned to recover from ransomware without paying.',
    amber: 'Backups exist but the controls that make them ransomware-survivable are incomplete. Either isolation, encryption, or restoration testing is partial. Untested backups are an assumption, not a recovery plan.',
    red:   'Backups are reachable from production, or untested, or both. In a ransomware event, the most likely outcome is that backups will be encrypted alongside production data and recovery will not be possible without paying.'
  },
  pam: {
    green: 'Privileged credentials are vaulted and session-controlled. Admin access is governed rather than assumed.',
    amber: 'PAM is partially in place. Some accounts are vaulted, or JIT and session recording exist but not both. The accounts that matter most are the ones still managed manually.',
    red:   'Privileged credentials are not under formal management. Admin accounts are the highest-value target in any environment; the absence of a PAM control is a material gap.'
  },
  email: {
    green: 'Advanced email filtering is in place and DMARC, DKIM, and SPF are configured and enforced. Phishing and spoofing have meaningful barriers in front of them.',
    amber: 'Email security is partial. Either filtering is basic without sandboxing, or DMARC is configured but not enforced. Filtering without enforcement is a setting, not a control.',
    red:   'Email security is at default carrier filtering, or DMARC is unconfigured. Email remains the most common initial-access vector; this should not be at the bottom of the list.'
  },
  training: {
    green: 'Annual training is in place with role-based modules for high-risk staff, and phishing simulations run at least quarterly with tracked metrics. The human layer is being treated as a control surface.',
    amber: 'Training exists but is inconsistent. Either annual training without phishing simulation, or simulations run without remediation. The metric that matters is click rate over time, not completion percentage.',
    red:   'No formal security awareness or phishing simulation programme. Humans are the most-targeted control surface; this is one of the lowest-cost gaps to close.'
  }
};

const CLOSE_TEXT = 'This Self-Check partially covers six of the sixteen control domains cyber insurers evaluate: Multi-Factor Authentication, Endpoint Detection and Response, Backups, Privileged Access Management, Email and Web Security, and Awareness Training. The other ten (patch management, logging and monitoring, incident response, end-of-life systems, hardening, supply chain, DLP, cloud and SaaS, external attack surface, and application and API security) are part of a full Vigilance Verification engagement. If anything in these findings warrants a longer conversation, that is what the engagement is for.';

function loadAnswers() { try { return JSON.parse(sessionStorage.getItem(STORAGE_KEY)) || {}; } catch (e) { return {}; } }
function scoreAnswer(v) { if (v === 'yes') return 10; if (v === 'partially') return 5; return 0; }
function scoreDomain(domain, answers) {
  let earned = 0, answered = 0;
  domain.questions.forEach(qid => {
    if (answers[qid] !== undefined && answers[qid] !== null) { earned += scoreAnswer(answers[qid]); answered++; }
  });
  const max = domain.questions.length * 10;
  return { earned: earned, max: max, pct: max > 0 ? Math.round((earned / max) * 100) : 0, answered: answered };
}
function rag(pct) { if (pct >= 75) return 'green'; if (pct >= 40) return 'amber'; return 'red'; }
function ragLabel(b) { if (b === 'green') return 'Strong'; if (b === 'amber') return 'Gaps present'; return 'Material gap'; }
function escapeHtml(s) { return String(s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }

function render() {
  const answers = loadAnswers();
  const root = document.getElementById('cyber-sc-results-root');
  if (Object.keys(answers).length === 0) {
    let empty = '<h1 class="sc-title">No answers yet.</h1>';
    empty += '<p class="sc-lede">It looks like you have not completed the Self-Check, or your session expired. Take three minutes and you will have a directional read on your cyber posture.</p>';
    empty += '<div class="sc-cta-row"><a class="btn btn-primary" href="/practice-areas/cybersecurity/self-check/">START THE SELF-CHECK <span class="btn-arrow">&rarr;</span></a></div>';
    root.innerHTML = empty;
    return;
  }
  const domainResults = DOMAINS.map(d => { const s = scoreDomain(d, answers); return { domain: d, score: s, band: rag(s.pct) }; });
  const totalEarned = domainResults.reduce((acc, r) => acc + r.score.earned, 0);
  const totalMax = domainResults.reduce((acc, r) => acc + r.score.max, 0);
  const overallPct = totalMax > 0 ? Math.round((totalEarned / totalMax) * 100) : 0;
  const overallBand = rag(overallPct);

  let html = '<div class="label label-rule sc-eyebrow">Self-Check Results</div>';
  html += '<h1 class="sc-title">Your cyber posture, <em>directionally.</em></h1>';
  html += '<p class="sc-lede" style="font-size: 16px; font-style: italic;">Self-Check findings are directional, not definitive. They cover six of the sixteen control domains cyber insurers evaluate. A full Vigilance Verification engagement covers the rest.</p>';
  /* Overall band — BB pattern: neutral band, color signal lives in cards */
  html += '<aside class="sc-band">';
  html += '<div class="sc-band-eyebrow">OVERALL &middot; ' + overallPct + '%</div>';
  html += '<p class="sc-band-text">';
  if (overallBand === 'green') {
    html += 'Strong posture across the six domains in scope. The controls insurers look at first are in place.';
  } else if (overallBand === 'amber') {
    html += 'Controls are present but gaps exist. The findings below identify where remediation is most material.';
  } else {
    html += 'Significant gaps across the six domains in scope. Several of these are foundational controls that warrant near-term attention.';
  }
  html += '</p>';
  html += '</aside>';

  /* Per-domain findings — reuse BB severity classes (clear/material/critical) */
  const BAND_TO_SEV = { green: 'clear', amber: 'material', red: 'critical' };
  html += '<div class="sc-findings-eyebrow">FINDINGS BY DOMAIN</div>';
  domainResults.forEach(r => {
    if (r.score.answered === 0) return;
    const band = r.band;
    const sev = BAND_TO_SEV[band];
    const finding = FINDINGS[r.domain.id] && FINDINGS[r.domain.id][band] ? FINDINGS[r.domain.id][band] : '';
    html += '<article class="sc-finding sc-finding-' + sev + '">';
    html += '<h3 class="sc-finding-title">' + escapeHtml(r.domain.name) + ' <span class="sc-finding-sev">' + escapeHtml(ragLabel(band).toUpperCase()) + ' &middot; ' + r.score.pct + '%</span></h3>';
    html += '<p class="sc-finding-para">' + escapeHtml(finding) + '</p>';
    html += '</article>';
  });
  html += '<section class="sc-cta-section">';
  html += '<div class="label label-rule sc-cta-eyebrow">What this Self-Check does not cover</div>';
  html += '<p class="sc-cta-body">' + escapeHtml(CLOSE_TEXT) + '</p>';
  html += '<div class="sc-cta-row">';
  html += '<a class="btn btn-primary" href="/contact/?topic=vigilance-verification">TALK TO LAM ABOUT VIGILANCE VERIFICATION <span class="btn-arrow">&rarr;</span></a>';
  html += '<a class="btn btn-ghost" href="/practice-areas/cybersecurity/self-check/">RETAKE THE SELF-CHECK</a>';
  html += '</div></section>';
  root.innerHTML = html;
  if (typeof gtag === 'function') {
    gtag('event', 'self_check_results_view', { tool: 'cyber_vigilance_verification', overall_pct: overallPct, overall_band: overallBand });
  }
}
render();
</script>
