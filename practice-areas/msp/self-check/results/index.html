        if (oldScript.src) newScript.src = oldScript.src;
        else newScript.textContent = oldScript.textContent;
        oldScript.parentNode.replaceChild(newScript, oldScript);
      });
    } catch (e) { console.error(e); }
  };
  await Promise.all([
    loadPartial('lam-nav', '/partials/nav-redesign.html?v=15'),

  ]);
  const currentPath = window.location.pathname;
  document.querySelectorAll('#lam-nav .nav-links a').forEach(link => {

    if (href && currentPath.startsWith(href) && href !== '/') {
      link.classList.add('nav-active');

      link.classList.add('nav-active');

})();

<script>
"use strict";
var STORAGE_KEY = "msp_sc_answers_v1";
var SEV_LABELS = { critical: "Critical", material: "Material", note: "Note", clear: "Clear", framing: "Framing" };

function loadAnswers(){ try { var s = sessionStorage.getItem(STORAGE_KEY); if (s) return JSON.parse(s) || {}; } catch(e){} return {}; }
function buildFindings(a){
  var out = [];
  if (a.gate === "inhouse") { return { mode: "inhouse", findings: [] }; }
  if (a.gate === "considering") { out.push(F_CONSIDERING()); return { mode: "considering", findings: out }; }
  if (a.visibility === "noidea") out.push(F_VISIBILITY("critical"));
  else if (a.visibility === "mostly") out.push(F_VISIBILITY("material"));
  var pricingTrueCount = 0;
  if (a.pricing && typeof a.pricing === "object") { Object.keys(a.pricing).forEach(function(k){ if (a.pricing[k] === "true") pricingTrueCount++; }); }
  if (pricingTrueCount >= 2) out.push(F_PRICING("critical"));
  else if (pricingTrueCount === 1) out.push(F_PRICING("material"));
  var ratingKeys = ["rate_field","rate_noc","rate_helpdesk","rate_lifecycle"];
  var lowCount = 0;
  ratingKeys.forEach(function(k){ if (typeof a[k] === "number" && a[k] <= 3) lowCount++; });
  if (lowCount >= 2) out.push(F_SERVICE("critical"));
  else if (lowCount === 1) out.push(F_SERVICE("material"));
  if (Array.isArray(a.why_low) && a.why_low.length > 0) out.push(F_PATTERN());
  if (Array.isArray(a.contract) && a.contract.length > 0) {
    var hasFlag = a.contract.some(function(c){ return c !== "dont_know"; });
    var hasDontKnow = a.contract.indexOf("dont_know") !== -1;
    if (hasFlag || hasDontKnow) out.push(F_CONTRACT());
  }
  if (out.length === 0) out.push(F_CLEAN());
  return { mode: "outsourced", findings: out };
}
function F_VISIBILITY(sev){
  if (sev === "critical") return {
    severity: "critical", headline: "You can’t manage what you can’t see.",
    paragraphs: [
      { label: "What we saw:", text: "You told us you’d struggle to explain, in plain language, what your MSP actually does day-to-day — which tickets, which patches, which projects, at what cost." },
      { label: "What it usually means:", text: "When the client can’t narrate the work, the MSP controls the narrative. Renewals get framed as “everything’s fine” because there’s no shared scoreboard to say otherwise. This is the single strongest predictor of recoverable spend in a mid-market MSP relationship." },
      { label: "What MSP Microscope™ does:", text: "Builds the scoreboard your MSP should have built for you — ticket mix, time-to-resolve, project vs. run-rate split, spend by function — in language your CFO and your operators can both read." }
    ]
  };
  return {
    severity: "material", headline: "You know the shape, not the seams.",
    paragraphs: [
      { label: "What we saw:", text: "You have a working sense of what your MSP does, but the details — actual hours, actual mix, actual exceptions — live on their side of the wall." },
      { label: "What it usually means:", text: "“Mostly know” is where most mid-market relationships sit, and it’s where the 10–20% recoverable spend tends to hide. Not in fraud, in friction: scope creep on projects, hours billed against vague tickets, services you’re paying for and not using." },
      { label: "What MSP Microscope™ does:", text: "Closes the seams. We rebuild the picture from invoices, tickets, and contract language, then show you which line items are working, which are leaking, and which are renegotiable." }
    ]
  };
}
function F_PRICING(sev){
  if (sev === "critical") return {
    severity: "critical", headline: "Your pricing is drifting above the market.",
    paragraphs: [
      { label: "What we saw:", text: "Two or more of your pricing markers came in above the bands we typically see for mid-market MSP relationships — knowledge-worker seat cost, field dispatch rate, or project billing trajectory." },
      { label: "What it usually means:", text: "Individually, any one of these can be defensible. Together, they’re a pattern: the relationship was priced for a different scope, a different size, or a different year, and nobody has reset it. Mid-market MSP seats over $50/user/month and field rates over $175/hour are negotiable in nine cases out of ten — if you know to ask." },
      { label: "What MSP Microscope™ does:", text: "Benchmarks every line against current market, then runs the renegotiation conversation with your MSP — or, if the gap is too wide, prices the alternatives." }
    ]
  };
  return {
    severity: "material", headline: "One pricing line is worth a closer look.",
    paragraphs: [
      { label: "What we saw:", text: "One of your pricing markers came in above typical mid-market bands." },
      { label: "What it usually means:", text: "A single flag isn’t a crisis, but it’s almost always a renegotiation lever your MSP isn’t going to surface on their own. The cost of asking is zero. The cost of not asking compounds annually." },
      { label: "What MSP Microscope™ does:", text: "Validates the flag against current market data and, if it holds, runs the conversation that resets the line." }
    ]
  };
}
function F_SERVICE(sev){
  if (sev === "critical") return {
    severity: "critical", headline: "The service tiers you rely on aren’t holding up.",
    paragraphs: [
      { label: "What we saw:", text: "You rated two or more outsourced functions at 3 or below — meaning they’re underperforming relative to what you’re paying for." },
      { label: "What it usually means:", text: "Service quality gaps in multiple functions usually point to one of three things: the MSP is over-extended, the SOW was written for a smaller version of your company, or the people staffed to your account have rotated out. None of those fix themselves." },
      { label: "What MSP Microscope™ does:", text: "Diagnoses which of the three is actually happening, then sizes the fix — restructure the contract, escalate within the MSP, or move the function. We don’t replace the MSP; we make the call about whether you should." }
    ]
  };
  return {
    severity: "material", headline: "One function is dragging.",
    paragraphs: [
      { label: "What we saw:", text: "You rated one outsourced function at 3 or below." },
      { label: "What it usually means:", text: "A single underperforming function is usually fixable inside the existing relationship — but only if it gets named, scoped, and pinned to an SLA your MSP actually signs up to. Most clients don’t run that conversation because they don’t have the leverage or the language." },
      { label: "What MSP Microscope™ does:", text: "Names the function, builds the case, and runs the conversation. If the MSP can’t or won’t fix it, we price the alternative." }
    ]
  };
}
function F_PATTERN(){
  return {
    severity: "material", headline: "The pattern behind the rating matters more than the rating.",
    paragraphs: [
      { label: "What we saw:", text: "When we asked why a function was underperforming, the answers pointed to operating-pattern issues — slow response, ticket churn, account-team turnover, or scope ambiguity — rather than to any single incident." },
      { label: "What it usually means:", text: "Operating-pattern issues are the ones MSPs are best at deflecting in QBRs and worst at fixing without external pressure. They don’t show up cleanly in any one ticket, so they’re easy to wave off as “we’re working on it” — for years." },
      { label: "What MSP Microscope™ does:", text: "Documents the pattern across tickets, makes it un-deflectable, and pins the fix to a timeline. If the pattern is structural — the MSP isn’t built to deliver what you need — we say so." }
    ]
  };
}
function F_CONTRACT(){
  return {
    severity: "material", headline: "Your contract is doing less work for you than it should.",
    paragraphs: [
      { label: "What we saw:", text: "Your contract has one or more of: vague scope language, low SLA credit caps, no clear right-to-review, or non-portable data and configurations — or you’re not sure, which is itself the finding." },
      { label: "What it usually means:", text: "Mid-market MSP contracts are written by the MSP’s lawyers, for the MSP. Vague scope makes scope creep billable. Low SLA caps make underperformance cheap for them. No right-to-review makes the invoice unverifiable. Non-portable data makes leaving expensive. None of this is malicious; all of it is leverage you don’t have." },
      { label: "What MSP Microscope™ does:", text: "Reads the contract the way the MSP’s lawyer read it, then identifies which clauses are renegotiable at renewal and which are dealbreakers if you ever need to move. The best time to do this is 6–9 months before contract end." }
    ]
  };
}
function F_CONSIDERING(){
  return {
    severity: "framing", headline: "Get the math right before you outsource — not after.",
    paragraphs: [
      { label: "What we saw:", text: "You’re considering outsourcing some or all of your IT operations but haven’t pulled the trigger." },
      { label: "What it usually means:", text: "The mid-market companies that get outsourcing right do two things before signing: they baseline their actual current cost (fully loaded, not just headcount), and they write the SOW themselves instead of accepting the MSP’s template. The ones who skip those two steps spend the next three years paying for that decision." },
      { label: "What MSP Microscope™ does:", text: "Runs the pre-outsourcing version of the engagement — baseline, scope, market check, and SOW — so the contract you sign is one your MSP has to perform against, not one they wrote to perform comfortably inside." }
    ]
  };
}
function F_CLEAN(){
  return {
    severity: "clear", headline: "Your relationship looks healthier than most we see.",
    paragraphs: [
      { label: "What we saw:", text: "Across visibility, pricing, service quality, operating patterns, and contract structure, none of your answers tripped a flag." },
      { label: "What it usually means:", text: "That’s rarer than you’d think — and worth keeping that way. Most mid-market MSP relationships drift over time; the ones that don’t are the ones being actively managed by the client, not just the MSP." },
      { label: "What MSP Microscope™ does:", text: "If you want a second set of eyes before your next renewal — to confirm the relationship is still as good as it feels — the engagement is built to do exactly that." }
    ]
  };
}
function escapeHtml(s){ return String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;").replace(/'/g,"&#39;"); }

function renderInhouse(root){
  var html = '';
  html += '<header class="sc-hero">';
  html += '<div class="sc-eyebrow"><span class="accent">[MSP MICROSCOPE™]</span> <span class="sep">·</span> SELF-CHECK <span class="sep">·</span> RESULTS</div>';
  html += '<h1 class="sc-title">This Self-Check isn’t built for you — <em>but Infrastructure Insight is.</em></h1>';
  html += '<div class="sc-positioning">';
  html += '<p><strong>What we saw:</strong> You run IT in-house. The MSP Microscope™ Self-Check is built around outsourced relationships, so the questions wouldn’t tell you anything useful.</p>';
  html += '<p><strong>What’s actually useful:</strong> For in-house IT, the equivalent lens is <strong>Infrastructure Insight</strong> — same approach (independent read, plain-language report, no replacement-of-anything), aimed at your stack, your operations, and your spend rather than at a vendor relationship.</p>';
  html += '</div>';
  html += '</header>';
  html += '<div class="sc-cta-row">';
  html += '<a class="btn btn-primary" href="/practice-areas/infrastructure/">SEE INFRASTRUCTURE INSIGHT <span class="btn-arrow">&rarr;</span></a>';
  html += '<a class="btn btn-ghost" href="/practice-areas/msp/self-check/">RETAKE THE SELF-CHECK</a>';
  html += '</div>';
  root.innerHTML = html;
}
function renderFindings(root, mode, findings){
  var subhead;
  if (mode === "considering") subhead = "You’re weighing whether to outsource. <em>Here’s how to do it without paying for the mistake later.</em>";
  else if (findings.length === 1 && findings[0].severity === "clear") subhead = "Across the five things we test for, <em>nothing tripped a flag.</em>";
  else subhead = "Plain-language read on where the friction or leakage in your MSP relationship <em>likely is.</em>";

  var html = '';
  html += '<header class="sc-hero">';
  html += '<div class="sc-eyebrow"><span class="accent">[MSP MICROSCOPE™]</span> <span class="sep">·</span> SELF-CHECK <span class="sep">·</span> FINDINGS</div>';
  html += '<h1 class="sc-title">' + subhead + '</h1>';
  html += '</header>';

  // Magnitude band only for outsourced mode
  if (mode === "outsourced") {
    html += '<aside class="sc-band">';
    html += '<div class="sc-band-eyebrow">THE MAGNITUDE</div>';
    html += '<p class="sc-band-text">On a typical mid-market MSP relationship, LAM finds 10–20% of spend recoverable. On a sloppy one, 25%+. The best time to start? 6–9 months before contract end. Inside 3–4 months, there isn’t enough runway to make a change.</p>';
    html += '</aside>';
  }

  html += '<div class="sc-findings-eyebrow">FINDINGS &middot; ' + findings.length + (findings.length === 1 ? ' SIGNAL' : ' SIGNALS') + '</div>';
  html += '<div class="sc-findings">';
  findings.forEach(function(f){
    html += '<article class="sc-finding sc-finding-' + f.severity + '">';
    html += '<span class="sc-finding-sev">' + escapeHtml(SEV_LABELS[f.severity] || f.severity) + '</span>';
    html += '<h2 class="sc-finding-title">' + escapeHtml(f.headline) + '</h2>';
    f.paragraphs.forEach(function(p){
      html += '<p class="sc-finding-para"><strong>' + escapeHtml(p.label) + '</strong> ' + escapeHtml(p.text) + '</p>';
    });
    html += '</article>';
  });
  html += '</div>';

  html += '<aside class="sc-cross">MSP problems and infrastructure problems travel together. See the full <a href="/practice-areas/infrastructure/">Infrastructure Insight</a> lens.</aside>';

  html += '<section class="sc-cta-section">';
  html += '<div class="sc-cta-eyebrow">WHAT HAPPENS NEXT</div>';
  html += '<h2 class="sc-cta-headline"><em>Validate the signals. Run the change if one is warranted.</em></h2>';
  html += '<p class="sc-cta-body">The Self-Check surfaces signals. The MSP Microscope™ engagement validates them, prices the alternatives, and runs the change if one is warranted. The best time to start is 6–9 months before contract end.</p>';
  html += '<div class="sc-cta-row">';
  html += '<a class="btn btn-primary" href="/contact/?topic=msp-microscope">BOOK AN MSP MICROSCOPE CONVERSATION <span class="btn-arrow">&rarr;</span></a>';
  html += '<a class="btn btn-ghost" href="/practice-areas/msp/self-check/">RETAKE THE SELF-CHECK</a>';
  html += '</div>';
  html += '</section>';

  root.innerHTML = html;
}
function renderEmpty(root){
  var html = '';
  html += '<div class="sc-empty">';
  html += '<header class="sc-hero">';
  html += '<div class="sc-eyebrow"><span class="accent">[MSP MICROSCOPE™]</span> <span class="sep">·</span> SELF-CHECK <span class="sep">·</span> RESULTS</div>';
  html += '<h1 class="sc-title">It looks like you haven’t taken the Self-Check yet.</h1>';
  html += '<p class="sc-lede">Findings appear here after you complete the 10-question Self-Check.</p>';
  html += '</header>';
  html += '<div class="sc-cta-row"><a class="btn btn-primary" href="/practice-areas/msp/self-check/">TAKE THE SELF-CHECK <span class="btn-arrow">&rarr;</span></a></div>';
  html += '</div>';
  root.innerHTML = html;
}
function fireGAComplete(findings){
  if (typeof gtag !== "function") return;
  var critical_count = findings.filter(function(x){ return x.severity === "critical"; }).length;
  var material_count = findings.filter(function(x){ return x.severity === "material"; }).length;
  var note_count = findings.filter(function(x){ return x.severity === "note"; }).length;
  var clear_count = findings.filter(function(x){ return x.severity === "clear"; }).length;
  var framing_count = findings.filter(function(x){ return x.severity === "framing"; }).length;
  gtag("event", "self_check_complete", {
    tool: "msp_microscope",
    finding_count: findings.length,
    critical_count: critical_count,
    material_count: material_count,
    note_count: note_count,
    clear_count: clear_count,
    framing_count: framing_count
  });
}
function attachOutboundTracking(root, findingCount){
  if (typeof gtag !== "function") return;
  root.addEventListener("click", function(e) {
    var t = e.target.closest && e.target.closest("a");
    if (!t) return;
    var href = t.getAttribute("href") || "";
    if (href.indexOf("/contact/") !== -1 || href.indexOf("mailto:") !== -1) {
      gtag("event", "self_check_to_snapshot", {
        tool: "msp_microscope",
        target_href: href,
        finding_count: findingCount
      });
    }
  });
}
function init(){
  var a = loadAnswers();
  var root = document.getElementById("msp-sc-results-root");
  if (!a || Object.keys(a).length === 0) { renderEmpty(root); return; }
  if (a.gate === "inhouse") {
    renderInhouse(root);
    fireGAComplete([]);
    attachOutboundTracking(root, 0);
    return;
  }
  var result = buildFindings(a);
  renderFindings(root, result.mode, result.findings);
  fireGAComplete(result.findings);
  attachOutboundTracking(root, result.findings.length);
}
document.addEventListener("DOMContentLoaded", init);
</script>
