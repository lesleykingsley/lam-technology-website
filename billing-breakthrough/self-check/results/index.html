        else newScript.textContent = oldScript.textContent;
        oldScript.parentNode.replaceChild(newScript, oldScript);
      });
    } catch (e) { console.error(e); }
  };
  await Promise.all([
    loadPartial('lam-nav', '/partials/nav-redesign.html?v=16'),
    loadPartial('lam-footer', '/partials/footer-redesign.html?v=17')
  ]);
  const currentPath = window.location.pathname;
  document.querySelectorAll('#lam-nav .nav-links a').forEach(link => {
    const href = link.getAttribute('href');
    if (href && currentPath.startsWith(href) && href !== '/') {
      link.classList.add('nav-active');

<script>
const QUESTIONS_ORDER = ['locations','inventory','pots','pots_sunset','legacy_voice','per_minute','ccaas','circuits','suppliers','gaps','mobility'];
const SEV_LABELS = { critical: 'Critical', material: 'Material', note: 'Note', clear: 'Clear', framing: 'Framing' };

function getAnswers() {
  try { return JSON.parse(sessionStorage.getItem('bb_sc_answers_v1')) || {}; } catch (e) { return {}; }
}

function locationTier(a) {
  const v = a.locations;
  if (v === 'lt10' || v === '10_50') return 'small';
  if (v === '51_200' || v === '201_500') return 'mid';
  if (v === 'gt500') return 'large';
  return 'mid';
}

function buildFindings(a) {
  const f = [];

  if (a.inventory && a.inventory !== 'current') {
    f.push({
      title: 'Inventory gap', severity: 'note',
      body: 'Without a current written inventory, the other findings on this page cannot be confirmed or ruled out. This is the first thing to fix. At scale, an inventory gap is not an oversight, it is a structural problem, and the fix is a different engagement than a small-client review.',
      redeploy: 'Recovered spend from cleaning up inventory typically funds the documentation and tooling that prevents the gap from reopening.'
    });
  }

  const potsLeak = a.pots === 'unsure_need' || a.pots === 'unsure';
  const legacy = a.legacy_voice === 'yes' || a.legacy_voice === 'unsure';
  if (potsLeak || legacy) {
    f.push({
      title: 'Legacy voice infrastructure leak', severity: 'material',
      body: 'POTS lines and PRI circuits that were never decommissioned are one of the most common leaks LAM sees. POTS lines commonly bill in the high three figures or low four figures per line per month. PRI circuits can run several thousand to tens of thousands per month in environments LAM has reviewed.',
      redeploy: 'Most LAM clients redeploy recovered legacy voice spend into SIP migration or cloud voice, which is the architecture they were moving to anyway.'
    });
  }

  const hasPots = a.pots === 'documented' || a.pots === 'unsure_need' || a.pots === 'unsure';
  const noPlan = a.pots_sunset === 'no_plan' || a.pots_sunset === 'first_hearing';
  if (hasPots && noPlan) {
    f.push({
      title: 'POTS sunset exposure', severity: 'critical',
      body: 'Major carriers are actively decommissioning POTS copper service under the FCC unbundling order. Notice windows are short. Lines used for fax, alarm, elevator, fire, and back-of-house phones need a planned migration to cellular, VoIP, or managed POTS replacement. An unplanned cutover is more expensive than a planned one and can take critical safety systems offline.',
      redeploy: 'Recovered POTS spend typically funds the cellular or managed-replacement migration that the sunset requires anyway. The leakage and the modernization are the same conversation.'
    });
  }

  if (a.per_minute === 'not_reviewed' || a.per_minute === 'unsure') {
    f.push({
      title: 'Above-market voice rates and plans', severity: 'material',
      body: 'Per-minute toll-free, 8YY rates, and legacy long-distance plans are some of the most commonly unbenchmarked items on a telecom bill. Contact center environments are particularly exposed. Bundled or flat-rate LD plans negotiated years ago routinely cost more than equivalent SIP or cloud voice service today.',
      redeploy: 'Most LAM clients redeploy recovered voice spend into modern voice architecture or contact center capabilities they could not previously fund.'
    });
  }

  if (a.circuits === 'no_failover') {
    f.push({
      title: 'Dedicated circuits without failover', severity: 'critical',
      body: 'A dedicated circuit without a documented failover path is both a cost issue and a resilience issue. Above-market dedicated pricing is common, and a single-path design is a business continuity risk regardless of the price.',
      redeploy: 'Recovered circuit spend typically funds SD-WAN deployment or proper failover architecture, which is what the environment needed in the first place.'
    });
  }

  if (a.ccaas === 'not_reviewed' || a.ccaas === 'unsure_when' || a.ccaas === 'unsure') {
    const tier = locationTier(a);
    let body = 'Contact center platforms accumulate cost in three places: licensed seats no longer assigned to active agents, premium features turned on but unused, and per-minute rates that have not been benchmarked since contract signing.';
    if (tier === 'mid' || tier === 'large') {
      body += ' At your scale, a 12-month review typically identifies 30 percent or more in recoverable seat and feature spend.';
    }
    if (tier === 'large') {
      body += ' On a recent engagement at this scale, LAM recovered 50 percent of monthly contact center spend, an annualized recovery in the seven figures for a single client.';
    }
    f.push({
      title: 'CCaaS overspend', severity: 'critical',
      body: body,
      redeploy: 'Most LAM clients redeploy recovered CCaaS spend into AI features, transcription, QA tooling, or seat expansion that was previously unfunded.'
    });
  }

  if (a.suppliers === '5plus' && a.gaps === 'yes') {
    f.push({
      title: 'Vendor sprawl with coverage gaps', severity: 'material',
      body: 'Paying multiple suppliers for overlapping services while leaving real gaps elsewhere is a portfolio mismanagement signal, not a duplicate-billing problem. The fix is consolidation and rebalance, not renegotiation.',
      redeploy: 'Most LAM clients redeploy recovered consolidation spend into the cybersecurity or monitoring gaps that the sprawl was masking.'
    });
  }

  if (a.mobility && a.mobility !== 'small_recent' && a.mobility !== 'mid_recent') {
    let body = 'Mobility environments accumulate waste in three places: zombie lines (active billing for inactive users), oversized plans, and stale device upgrade cycles. Recoverable mobility spend typically runs 30 percent or more in mid-market environments.';
    if (a.mobility === 'large' || a.mobility === 'enterprise') {
      body += ' On fleets of 500 or more lines, recoverable waste typically runs into six figures. On 1,000-line fleets, zombie line rates of 8 to 12 percent are common. Fleets untouched for three or more years commonly recover 30 percent or more.';
    }
    f.push({
      title: 'Mobility waste', severity: 'material',
      body: body,
      redeploy: 'Most LAM clients redeploy recovered mobility spend into device refresh cycles, MDM upgrades, or expansion into ruggedized devices for field workers.'
    });
  }

  return f;
}

function buildBand(a, count) {
  const tier = locationTier(a);
  let lead = '';
  if (tier === 'large') {
    lead = 'Across your scale of operations, even a conservative recovery is a material number. ';
  } else if (tier === 'mid') {
    lead = 'At your scale, recovery is typically a meaningful line item rather than a rounding error. ';
  }
  let body;
  if (count === 0) {
    body = lead + 'Your environment looks tighter than most. Most environments still surface a few opportunities once we look at line-item data, so a snapshot would confirm whether yours is the exception.';
  } else if (count <= 2) {
    body = lead + 'Your environment likely has 20 to 30 percent recoverable spend. This is the typical mid-market range LAM sees.';
  } else if (count <= 4) {
    body = lead + 'Your environment likely has 30 percent or more recoverable spend.';
  } else {
    body = lead + 'Your environment likely has 30 percent or more recoverable spend, and possibly 40 percent or more if it has been neglected. This is the upper range LAM sees.';
  }
  return body;
}

function escapeHtml(s) {
  return String(s).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;').replace(/'/g, '&#39;');
}

(function () {
  const a = getAnswers();
  const root = document.getElementById('bb-sc-results-root');
  const answered = QUESTIONS_ORDER.filter(k => a[k]).length;

  if (answered === 0) {
    let empty = '';
    empty += '<div class="sc-empty">';
    empty += '<header class="sc-hero">';
    empty += '<div class="sc-eyebrow"><span class="accent">[BILLING BREAKTHROUGH™]</span> <span class="sep">·</span> SELF-CHECK <span class="sep">·</span> RESULTS</div>';
    empty += '<h1 class="sc-title">It looks like you haven’t completed the Self-Check yet.</h1>';
    empty += '<p class="sc-lede">The 11-question Self-Check takes about five minutes. Your findings will appear here when you finish.</p>';
    empty += '</header>';
    empty += '<div class="sc-cta-row"><a class="btn btn-primary" href="/billing-breakthrough/self-check/">START THE SELF-CHECK <span class="btn-arrow">&rarr;</span></a></div>';
    empty += '</div>';
    root.innerHTML = empty;
    return;
  }

  const findings = buildFindings(a);
  const band = buildBand(a, findings.length);

  let html = '';
  html += '<header class="sc-hero">';
  html += '<div class="sc-eyebrow"><span class="accent">[BILLING BREAKTHROUGH™]</span> <span class="sep">·</span> SELF-CHECK <span class="sep">·</span> RESULTS</div>';
  html += '<h1 class="sc-title">Here is what your answers <em>suggest.</em></h1>';
  html += '<p class="sc-lede">Self-Check findings are directional, not definitive. The LAM snapshot engagement turns these signals into a written benchmark against current market rates and a modernization roadmap.</p>';
  html += '<p class="sc-lede" style="font-size: 16px; font-style: italic;">What you do with the recovery matters as much as the recovery itself. Most LAM clients redeploy recovered spend into modernization &mdash; POTS replacement, network refresh, security tooling, contact center AI &mdash; rather than returning it to the budget.</p>';
  html += '</header>';

  html += '<aside class="sc-band">';
  html += '<div class="sc-band-eyebrow">OVERALL PICTURE</div>';
  html += '<p class="sc-band-text">' + escapeHtml(band) + '</p>';
  html += '</aside>';

  if (findings.length === 0) {
    html += '<div class="sc-finding sc-finding-clear">';
    html += '<span class="sc-finding-sev">Clear</span>';
    html += '<h2 class="sc-finding-title">No findings triggered.</h2>';
    html += '<p class="sc-finding-para">Based on your answers, none of the common leakage patterns triggered. That is unusual and worth confirming. A LAM snapshot is the fastest way to verify.</p>';
    html += '</div>';
  } else {
    html += '<div class="sc-findings-eyebrow">FINDINGS &middot; ' + findings.length + (findings.length === 1 ? ' SIGNAL' : ' SIGNALS') + '</div>';
    html += '<div class="sc-findings">';
    findings.forEach(f => {
      html += '<article class="sc-finding sc-finding-' + f.severity + '">';
      html += '<span class="sc-finding-sev">' + escapeHtml(SEV_LABELS[f.severity] || f.severity) + '</span>';
      html += '<h2 class="sc-finding-title">' + escapeHtml(f.title) + '</h2>';
      html += '<p class="sc-finding-para">' + escapeHtml(f.body) + '</p>';
      html += '<p class="sc-finding-redeploy">' + escapeHtml(f.redeploy) + '</p>';
      html += '</article>';
    });
    html += '</div>';
  }

  html += '<aside class="sc-cross">Billing problems and contract problems travel together. The Contract Clarifier™ Self-Check is the companion tool. <a href="/billing-breakthrough/">Learn about Contract Clarifier™</a> while we finish building the Self-Check version.</aside>';

  html += '<section class="sc-cta-section">';
  html += '<div class="sc-cta-eyebrow">WHAT HAPPENS NEXT</div>';
  html += '<h2 class="sc-cta-headline"><em>Turn the signals into a written benchmark.</em></h2>';
  html += '<p class="sc-cta-body">The Self-Check you just completed is free. The LAM snapshot engagement that follows is paid, scoped to your environment and the size of the opportunity. We will tell you what it costs before you commit, and we will tell you up front if your environment is too small or too clean for the engagement to be worth your investment.</p>';
  html += '<p class="sc-cta-body" style="font-size: 15px;"><strong>Who this is for:</strong> Companies with roughly $100,000 or more in total monthly recurring spend across telecom, network, contact center, mobility, cybersecurity, and data center services.</p>';
  html += '<div class="sc-cta-row">';
  html += '<a class="btn btn-primary" href="/contact/?topic=billing-breakthrough-snapshot">BOOK A SNAPSHOT CONVERSATION <span class="btn-arrow">&rarr;</span></a>';
  html += '<a class="btn btn-ghost" href="/billing-breakthrough/self-check/">RETAKE THE SELF-CHECK</a>';
  html += '</div>';
  html += '</section>';

  root.innerHTML = html;

  // GA4
  if (typeof gtag === 'function') {
    var critical_count = findings.filter(function(x){return x.severity === 'critical';}).length;
    var material_count = findings.filter(function(x){return x.severity === 'material';}).length;
    var note_count = findings.filter(function(x){return x.severity === 'note';}).length;
    var clear_count = findings.filter(function(x){return x.severity === 'clear';}).length;
    var framing_count = findings.filter(function(x){return x.severity === 'framing';}).length;
    gtag('event', 'self_check_complete', {
      tool: 'billing_breakthrough',
      finding_count: findings.length,
      critical_count: critical_count,
      material_count: material_count,
      note_count: note_count,
      clear_count: clear_count,
      framing_count: framing_count
    });
  }

  // Outbound CTA tracking
  if (typeof gtag === 'function') {
    root.addEventListener('click', function(e) {
      var t = e.target.closest && e.target.closest('a');
      if (!t) return;
      var href = t.getAttribute('href') || '';
      if (href.indexOf('/contact/') !== -1 || href.indexOf('mailto:') !== -1) {
        gtag('event', 'self_check_to_snapshot', {
          tool: 'billing_breakthrough',
          target_href: href,
          finding_count: findings.length
        });
      }
    });
  }
})();
</script>
