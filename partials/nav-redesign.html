    <!-- Hamburger button — visible on mobile only via CSS -->
    <button class="nav-hamburger" aria-label="Open menu" aria-expanded="false" aria-controls="mobile-menu">
      <span class="nav-hamburger-line"></span>
      <span class="nav-hamburger-line"></span>
      <span class="nav-hamburger-line"></span>
    </button>
  </div>
</nav>

<!-- Mobile menu overlay — full-screen, hidden by default -->
<div class="mobile-menu" id="mobile-menu" aria-hidden="true">
  <button class="mobile-menu-close" aria-label="Close menu">
    <span class="mobile-menu-close-line"></span>
    <span class="mobile-menu-close-line"></span>
  </button>
  <nav class="mobile-menu-nav">
    <a href="/how-we-work/" class="mobile-menu-link">Professional Services</a>
    <a href="/practice-areas/" class="mobile-menu-link">Practice Areas</a>
    <a href="/about-lam/" class="mobile-menu-link">Why LAM</a>
    <a href="/insights/" class="mobile-menu-link">Insights</a>
    <a href="/contact/" class="mobile-menu-link mobile-menu-cta">Just Ask LAM</a>
  </nav>
</div>

<script>
(function() {
  function initMobileMenu() {
    var hamburger = document.querySelector('.nav-hamburger');
    var closeBtn = document.querySelector('.mobile-menu-close');
    var menu = document.getElementById('mobile-menu');
    var body = document.body;

    if (!hamburger || !menu) return;
    if (hamburger.dataset.wired === '1') return;
    hamburger.dataset.wired = '1';

    function openMenu() {
      menu.classList.add('is-open');
      menu.setAttribute('aria-hidden', 'false');
      hamburger.setAttribute('aria-expanded', 'true');
      body.classList.add('mobile-menu-open');
    }

    function closeMenu() {
      menu.classList.remove('is-open');
      menu.setAttribute('aria-hidden', 'true');
      hamburger.setAttribute('aria-expanded', 'false');
      body.classList.remove('mobile-menu-open');
    }

    hamburger.addEventListener('click', openMenu);
    if (closeBtn) closeBtn.addEventListener('click', closeMenu);

    menu.querySelectorAll('.mobile-menu-link').forEach(function(link) {
      link.addEventListener('click', closeMenu);
    });

    document.addEventListener('keydown', function(e) {
      if (e.key === 'Escape' && menu.classList.contains('is-open')) closeMenu();
    });
  }

  initMobileMenu();
})();
</script>
