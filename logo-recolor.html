<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>LAM Logo Recolor Tool</title>
<style>
  *{box-sizing:border-box}
  body{margin:0;font-family:system-ui,sans-serif;background:#f7f7f8;color:#1a1a1a;padding:32px}
  h1{margin:0 0 8px;font-size:22px;color:#0d2240}
  p{margin:0 0 20px;color:#6b7280;font-size:14px;line-height:1.5}
  .grid{display:grid;grid-template-columns:1fr 1fr;gap:24px;margin-bottom:24px}
  .card{background:#fff;border:1px solid #e5e7eb;border-radius:8px;padding:20px}
  .card h2{margin:0 0 12px;font-size:14px;text-transform:uppercase;letter-spacing:.08em;color:#6b7280}
  .swatch-row{display:flex;align-items:center;gap:12px;margin-bottom:10px;font-size:13px}
  .swatch{width:28px;height:28px;border-radius:4px;border:1px solid #e5e7eb;flex-shrink:0}
  .arrow{color:#9ca3af}
  canvas{max-width:100%;height:auto;display:block;background:#fff;border:1px solid #e5e7eb;border-radius:4px}
  .canvas-dark{background:#0d2240;border-color:#0d2240}
  button{background:#0d2240;color:#fff;border:0;padding:12px 20px;border-radius:6px;font-size:14px;font-weight:600;cursor:pointer;margin-right:8px}
  button:hover{background:#1a3460}
  input[type=color]{width:50px;height:36px;border:1px solid #e5e7eb;border-radius:4px;cursor:pointer;padding:2px;background:#fff}
  label{font-size:13px;color:#6b7280;margin-right:8px}
  .controls{background:#fff;border:1px solid #e5e7eb;border-radius:8px;padding:20px;margin-bottom:24px}
  .controls .row{display:flex;align-items:center;gap:16px;margin-bottom:12px;flex-wrap:wrap}
  .controls .row:last-child{margin-bottom:0}
  .small{font-size:12px;color:#6b7280}
  code{background:#f3f4f6;padding:2px 6px;border-radius:3px;font-size:12px}
</style>
</head>
<body>
<h1>LAM Logo Recolor Tool</h1>
<p>Loads <code>/lam-logo.png</code>, remaps red→gold and grays→navy, preserves original geometry exactly.</p>

<div class="controls">
  <div class="row">
    <label>Red (#CF3A38) →</label>
    <input type="color" id="newRed" value="#d4a843">
    <span class="small">Gold accent</span>

    <label style="margin-left:24px">Dark gray →</label>
    <input type="color" id="newDarkGray" value="#0d2240">
    <span class="small">Navy (roof)</span>

    <label style="margin-left:24px">Light gray →</label>
    <input type="color" id="newLightGray" value="#1a3460">
    <span class="small">Lighter navy (wall)</span>
  </div>
  <div class="row">
    <button onclick="recolor()">Apply recolor</button>
    <button onclick="download()">Download recolored PNG</button>
    <span class="small">Adjust colors above, click Apply, then Download.</span>
  </div>
</div>

<div class="grid">
  <div class="card">
    <h2>Original</h2>
    <canvas id="original"></canvas>
  </div>
  <div class="card">
    <h2>Recolored</h2>
    <canvas id="recolored"></canvas>
  </div>
</div>

<div class="grid">
  <div class="card">
    <h2>Recolored on light background</h2>
    <canvas id="previewLight"></canvas>
  </div>
  <div class="card" style="background:#0d2240;border-color:#0d2240">
    <h2 style="color:#9ca3af">Recolored on dark background</h2>
    <canvas id="previewDark" class="canvas-dark"></canvas>
  </div>
</div>

<script>
const img = new Image();
img.crossOrigin = "anonymous";
img.onload = () => {
  ['original','recolored','previewLight','previewDark'].forEach(id => {
    const c = document.getElementById(id);
    c.width = img.width;
    c.height = img.height;
  });
  drawOriginal();
  recolor();
};
img.src = "/lam-logo.png";

function drawOriginal(){
  const ctx = document.getElementById('original').getContext('2d');
  ctx.drawImage(img,0,0);
}

// Color distance in RGB space
function dist(r1,g1,b1,r2,g2,b2){
  return Math.sqrt((r1-r2)**2+(g1-g2)**2+(b1-b2)**2);
}
function hexToRgb(h){
  h=h.replace('#','');
  return [parseInt(h.slice(0,2),16),parseInt(h.slice(2,4),16),parseInt(h.slice(4,6),16)];
}

function recolor(){
  const canvas = document.getElementById('recolored');
  const ctx = canvas.getContext('2d');
  ctx.clearRect(0,0,canvas.width,canvas.height);
  ctx.drawImage(img,0,0);
  const imgData = ctx.getImageData(0,0,canvas.width,canvas.height);
  const d = imgData.data;

  const [nr,ng,nb] = hexToRgb(document.getElementById('newRed').value);
  const [dr,dg,db] = hexToRgb(document.getElementById('newDarkGray').value);
  const [lr,lg,lb] = hexToRgb(document.getElementById('newLightGray').value);

  for(let i=0;i<d.length;i+=4){
    const r=d[i], g=d[i+1], b=d[i+2], a=d[i+3];
    if(a<10) continue; // skip transparent

    // 1) Red-ish pixels (CF3A38-ish): high red, low green/blue
    if(r>140 && g<100 && b<100 && r-g>50 && r-b>50){
      d[i]=nr; d[i+1]=ng; d[i+2]=nb;
      continue;
    }

    // 2) Dark gray (roof, ~#6c6e71): R,G,B all similar, medium-dark
    //    and 3) Light gray (wall, ~#a7a9ac): R,G,B all similar, light
    const maxChan = Math.max(r,g,b);
    const minChan = Math.min(r,g,b);
    const isGray = (maxChan-minChan) < 20; // low saturation
    if(isGray){
      // navy blue wordmark "LAM" is NOT gray (it's blue), so it won't match here
      // black "TECHNOLOGY" would match as very dark — skip true blacks to preserve black text
      if(maxChan < 40) continue; // keep near-black (the TECHNOLOGY text) as black
      // near-white keep as-is
      if(maxChan > 235) continue;

      if(maxChan < 130){
        // dark gray → navy
        d[i]=dr; d[i+1]=dg; d[i+2]=db;
      } else {
        // light gray → lighter navy
        d[i]=lr; d[i+1]=lg; d[i+2]=lb;
      }
    }
  }

  ctx.putImageData(imgData,0,0);

  // Also render into the preview canvases
  const light = document.getElementById('previewLight').getContext('2d');
  light.clearRect(0,0,canvas.width,canvas.height);
  light.drawImage(canvas,0,0);

  const dark = document.getElementById('previewDark').getContext('2d');
  dark.clearRect(0,0,canvas.width,canvas.height);
  dark.drawImage(canvas,0,0);
}

function download(){
  const canvas = document.getElementById('recolored');
  const link = document.createElement('a');
  link.download = 'LAM-Logo-Recolored.png';
  link.href = canvas.toDataURL('image/png');
  link.click();
}
</script>
</body>
</html>
